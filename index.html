<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夢想存摺 V3 - 視覺強化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .progress-bar { transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .habit-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <div class="sticky top-0 bg-gradient-to-br from-indigo-600 via-blue-700 to-cyan-600 text-white p-6 shadow-2xl z-20 rounded-b-[2.5rem]">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-xs opacity-80 mb-1 font-medium tracking-widest">TOTAL BALANCE</p>
                    <div class="flex items-center">
                        <span class="text-xl mr-1 text-yellow-300 font-bold">💎</span>
                        <h1 id="totalBank" class="text-4xl font-black tracking-tighter">0</h1>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-xs opacity-80 mb-1 font-medium tracking-widest">TODAY</p>
                    <p id="todayPoints" class="text-2xl font-black text-yellow-300">+0</p>
                </div>
            </div>
            <button onclick="settleDay()" class="w-full mt-6 bg-white/20 hover:bg-white/30 backdrop-blur-md border border-white/40 py-3 rounded-2xl text-sm font-black transition-all active:scale-95">
                🌙 結束今日：結算點數
            </button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-5 space-y-10">
        
        <section>
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-2xl font-black text-slate-800">📚 習慣養成區</h2>
                <button onclick="toggleModal('habitModal')" class="bg-indigo-600 text-white p-2 rounded-xl shadow-lg shadow-indigo-200 hover:rotate-90 transition-transform duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
            </div>
            <div id="habitList" class="grid grid-cols-1 gap-3">
                </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-2xl font-black text-slate-800">🎁 夢想商店</h2>
                <button onclick="toggleModal('rewardModal')" class="bg-emerald-500 text-white p-2 rounded-xl shadow-lg shadow-emerald-200 hover:rotate-90 transition-transform duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
            </div>
            <div id="rewardList" class="space-y-4">
                </div>
        </section>
    </div>

    <div id="habitModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-30 flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-black mb-4 text-slate-800">新增挑戰習慣</h3>
            <input id="newHabitName" type="text" placeholder="名稱 (例：🏃 慢跑 5km)" class="w-full bg-slate-100 border-none p-4 rounded-2xl mb-3 focus:ring-2 focus:ring-indigo-500 transition">
            <input id="newHabitPts" type="number" placeholder="獎勵點數" class="w-full bg-slate-100 border-none p-4 rounded-2xl mb-6 focus:ring-2 focus:ring-indigo-500 transition">
            <div class="flex space-x-3">
                <button onclick="toggleModal('habitModal')" class="flex-1 bg-slate-200 text-slate-600 py-4 rounded-2xl font-bold">取消</button>
                <button onclick="addItem('habit')" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200">添加</button>
            </div>
        </div>
    </div>

    <div id="rewardModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-30 flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-black mb-4 text-slate-800">新增想買清單</h3>
            <input id="newRewardName" type="text" placeholder="商品 (例：👟 新球鞋)" class="w-full bg-slate-100 border-none p-4 rounded-2xl mb-3 focus:ring-2 focus:ring-emerald-500 transition">
            <input id="newRewardPts" type="number" placeholder="所需點數" class="w-full bg-slate-100 border-none p-4 rounded-2xl mb-6 focus:ring-2 focus:ring-emerald-500 transition">
            <div class="flex space-x-3">
                <button onclick="toggleModal('rewardModal')" class="flex-1 bg-slate-200 text-slate-600 py-4 rounded-2xl font-bold">取消</button>
                <button onclick="addItem('reward')" class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-emerald-200">添加</button>
            </div>
        </div>
    </div>

    <script>
        // 初始化資料 (修復了逗號問題)
        let data = JSON.parse(localStorage.getItem('habitProDataV3')) || {
            totalBank: 0,
            todayPoints: 0,
            habits: [
                { name: '📖 閱讀成長書', pts: 800 },
                { name: '🚰 喝水 2000cc', pts: 300 },
                { name: '📝 多益模擬 800+', pts: 1200 },
                { name: '🗣️ 英文口說 30分', pts: 400 },
                { name: '🏋️ 健身房訓練', pts: 500 },
                { name: '🏃 跑 5km', pts: 600 },
                { name: '🧘 瑜伽 30分', pts: 300 },
                { name: '💤 12點前睡', pts: 500 },
                { name: '🎨 畫一張作品', pts: 500 },
                { name: '🎬 完成影片剪輯', pts: 1000 },
                { name: '💡 研究創業內容', pts: 400 }
            ],
            rewards: [
                { name: '🩲 瑪榭無縫內褲', pts: 2000 },
                { name: '👙 Sealf 比基尼', pts: 6000 },
                { name: '⌚ Garmin 手錶', pts: 18000 }
            ]
        };

        function saveData() {
            localStorage.setItem('habitProDataV3', JSON.stringify(data));
            render();
        }

        function render() {
            document.getElementById('totalBank').innerText = data.totalBank.toLocaleString();
            document.getElementById('todayPoints').innerText = `+${data.todayPoints}`;

            const hList = document.getElementById('habitList');
            hList.innerHTML = data.habits.map((h, i) => `
                <div class="flex items-center space-x-2 group">
                    <div onclick="addDailyPoints(${h.pts})" class="habit-card flex-1 flex justify-between items-center bg-white p-5 rounded-[1.5rem] shadow-sm border-b-4 border-slate-200 active:border-b-0 transition-all cursor-pointer">
                        <span class="font-bold text-slate-700">${h.name}</span>
                        <span class="font-black text-indigo-600 tracking-tighter">+${h.pts}</span>
                    </div>
                    <button onclick="deleteItem('habit', ${i})" class="text-slate-300 hover:text-red-500 transition-colors p-2 text-xl">✕</button>
                </div>
            `).join('');

            const rList = document.getElementById('rewardList');
            rList.innerHTML = data.rewards.map((r, i) => {
                const percent = Math.min((data.totalBank / r.pts) * 100, 100).toFixed(0);
                const isReady = data.totalBank >= r.pts;
                return `
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 relative overflow-hidden">
                        <button onclick="deleteItem('reward', ${i})" class="absolute top-4 right-4 text-slate-300 hover:text-red-500">✕</button>
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-black text-slate-800 text-lg">${r.name}</span>
                            <span class="text-xs font-bold text-slate-400 tracking-tighter uppercase">${data.totalBank} / ${r.pts}</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-4 p-1 shadow-inner">
                            <div class="progress-bar ${isReady ? 'bg-gradient-to-r from-emerald-400 to-green-500' : 'bg-gradient-to-r from-indigo-400 to-blue-500'} h-full rounded-full" style="width: ${percent}%"></div>
                        </div>
                        ${isReady ? `
                            <button onclick="exchange('${r.name}', ${r.pts})" class="w-full mt-5 bg-emerald-500 text-white py-3 rounded-2xl font-black shadow-xl shadow-emerald-100 active:scale-95 transition-all">
                                🎁 立即兌換
                            </button>
                        ` : `
                            <p class="text-center mt-3 text-xs font-bold text-slate-300">還差 ${(r.pts - data.totalBank).toLocaleString()} 點即可解鎖</p>
                        `}
                    </div>
                `;
            }).join('');
        }

        function addDailyPoints(pts) {
            data.todayPoints += pts;
            saveData();
        }

        function settleDay() {
            if(data.todayPoints === 0) return alert("今天還沒開始累積喔！加油！");
            if(confirm(`結算今日努力：+${data.todayPoints} 點？\n(結算後今日點數將歸零並存入總存摺)`)) {
                data.totalBank += data.todayPoints;
                data.todayPoints = 0;
                saveData();
            }
        }

        function addItem(type) {
            const name = document.getElementById(type === 'habit' ? 'newHabitName' : 'newRewardName').value;
            const pts = document.getElementById(type === 'habit' ? 'newHabitPts' : 'newRewardPts').value;
            if(!name || !pts) return alert("請輸入名稱與正確的點數喔！");
            
            data[type === 'habit' ? 'habits' : 'rewards'].push({ name, pts: parseInt(pts) });
            document.getElementById(type === 'habit' ? 'newHabitName' : 'newRewardName').value = '';
            document.getElementById(type === 'habit' ? 'newHabitPts' : 'newRewardPts').value = '';
            toggleModal(type === 'habit' ? 'habitModal' : 'rewardModal');
            saveData();
        }

        function deleteItem(type, index) {
            if(confirm("確定要刪除這個項目嗎？")) {
                data[type === 'habit' ? 'habits' : 'rewards'].splice(index, 1);
                saveData();
            }
        }

        function exchange(name, pts) {
            if(confirm(`確定要兌換「${name}」並扣除 ${pts} 點嗎？`)) {
                data.totalBank -= pts;
                saveData();
                alert(`恭喜！你成功兌換了 ${name}！這是你努力的成果！🎉`);
            }
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
        }

        render();
    </script>
</body>
</html>
